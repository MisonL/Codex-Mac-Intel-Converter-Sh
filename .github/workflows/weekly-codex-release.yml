name: Weekly Codex Intel Release

on:
  workflow_dispatch:
  push:
    branches:
      - cse/validate-release-updater
  schedule:
    - cron: '0 9 * * 1'
      timezone: 'Asia/Shanghai'

permissions:
  contents: write

concurrency:
  group: weekly-codex-intel-release
  cancel-in-progress: false

jobs:
  check-and-release:
    runs-on: macos-15-intel
    env:
      GH_TOKEN: ${{ github.token }}
      TZ: Asia/Shanghai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run scheduled Codex check
        id: release_check
        shell: bash
        run: ./scripts/check-codex-release.sh

      - name: Commit and push release tracking files
        if: github.ref_name == 'main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/codex-release-state.env docs/release-checks/history.tsv
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "${{ steps.release_check.outputs.commit_message }}"
          git push origin HEAD:main
