name: Codex Intel Archive

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive-notice:
    runs-on: ubuntu-latest
    steps:
      - name: Archive notice
        shell: bash
        run: |
          set -euo pipefail
          echo "This repository is archived."
          echo "Official OpenAI Mac Intel builds are available now."
          echo "Automatic upstream checks and release publishing have been disabled."
